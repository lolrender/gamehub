<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;">

<canvas id="c" width="400" height="400" style="background:black;"></canvas>

<script>
let c=document.getElementById("c");
let ctx=c.getContext("2d");

let snake=[{x:200,y:200}];
let dir={x:10,y:0};
let food={x:100,y:100};

document.onkeydown=e=>{
  if(e.key==="ArrowUp") dir={x:0,y:-10};
  if(e.key==="ArrowDown") dir={x:0,y:10};
  if(e.key==="ArrowLeft") dir={x:-10,y:0};
  if(e.key==="ArrowRight") dir={x:10,y:0};
};

function loop(){
  ctx.clearRect(0,0,400,400);

  let head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  snake.unshift(head);

  if(head.x===food.x && head.y===food.y){
    food.x=Math.floor(Math.random()*39)*10;
    food.y=Math.floor(Math.random()*39)*10;
  } else snake.pop();

  ctx.fillStyle="red";
  ctx.fillRect(food.x,food.y,10,10);

  ctx.fillStyle="lime";
  snake.forEach(s=>ctx.fillRect(s.x,s.y,10,10));
}

setInterval(loop,100);
</script>

</body>
</html>
