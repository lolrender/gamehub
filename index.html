<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nebula Web OS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR (browser style) -->
<div class="topbar">
  <div class="logo">🌐 Nebula OS</div>

  <input placeholder="Search apps, games, tools..." id="search" onkeyup="search()">

  <div class="tabs">
    <button onclick="openApp('home')">🏠 Home</button>
    <button onclick="openApp('games')">🎮 Games</button>
    <button onclick="openApp('tools')">🧰 Tools</button>
  </div>
</div>

<!-- MAIN SCREEN -->
<div id="screen">

  <!-- HOME -->
  <div id="home" class="page">
    <h1>Welcome to Nebula OS</h1>
    <p>Your web-based system for games, tools, and apps</p>

    <div class="grid">

      <div class="card" onclick="openApp('games')">🎮 Games Hub</div>
      <div class="card" onclick="openApp('tools')">🧰 Tools Hub</div>

    </div>
  </div>

  <!-- GAMES -->
  <div id="games" class="page hidden">

    <h2>🎮 Games</h2>

    <div class="grid">

      <div class="tile" onclick="launch('Snake','games/snake.html')">🐍 Snake</div>
      <div class="tile" onclick="launch('Pong','games/pong.html')">🏓 Pong</div>
      <div class="tile" onclick="launch('Clicker','games/clicker.html')">🖱 Clicker</div>

    </div>

  </div>

  <!-- TOOLS -->
  <div id="tools" class="page hidden">

    <h2>🧰 Tools</h2>

    <div class="grid">

      <div class="tile">🧮 Calculator</div>
      <div class="tile">📝 Notes</div>
      <div class="tile">⏱ Timer</div>

    </div>

  </div>

</div>

<!-- APP VIEW -->
<div id="appView">
  <button onclick="back()">← Back</button>
  <h2 id="title"></h2>
  <iframe id="frame"></iframe>
</div>

<script src="script.js"></script>
</body>
</html>
