<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo">🎮 Game Store</div>

  <input id="search" placeholder="Search games..." onkeyup="searchGames()">
</header>

<!-- HERO BANNER -->
<section class="hero">
  <div>
    <h1>Play Instant Games</h1>
    <p>No downloads • No installs • Just tap and play</p>
  </div>
</section>

<!-- FEATURED -->
<h2>⭐ Featured</h2>
<div class="row">

  <div class="tile" onclick="openGame('Snake','games/snake.html')">
    <div class="thumb snake"></div>
    <div class="title">Snake</div>
  </div>

  <div class="tile" onclick="openGame('Pong','games/pong.html')">
    <div class="thumb pong"></div>
    <div class="title">Pong</div>
  </div>

</div>

<!-- ALL GAMES -->
<h2>🎮 All Games</h2>
<div class="grid">

  <div class="tile" onclick="openGame('Snake','games/snake.html')">
    <div class="thumb snake"></div>
    <div class="title">Snake</div>
  </div>

  <div class="tile" onclick="openGame('Pong','games/pong.html')">
    <div class="thumb pong"></div>
    <div class="title">Pong</div>
  </div>

  <div class="tile" onclick="openGame('Clicker','games/clicker.html')">
    <div class="thumb clicker"></div>
    <div class="title">Clicker</div>
  </div>

</div>

<!-- GAME VIEW -->
<div id="gameView">
  <button onclick="back()">← Back</button>
  <h2 id="gameTitle"></h2>
  <iframe id="frame"></iframe>
</div>

<script src="script.js"></script>
</body>
</html>
